name: Deploy MD Files to S3

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**.md'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: us-east-1

      - name: Upload MD files to S3
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          aws s3 sync . s3://expertise-rag-artifacts-239571291755-prod/raw/${REPO_NAME}/ \
            --exclude "*" \
            --include "*.md" \
            --delete
